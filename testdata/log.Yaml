bufferCap: 1KB
bufferSize: 1000
appender:
  file:
    type: File
    fileName: log.txt
    layout:
      type: JSONLayout
  console@c: Console{layout=TextLayout{}}
  sample@c: Sample{layout.type=TextLayout}
logger:
  root:
    type: Logger
    minLevel: warn
    appenderRef:
      ref: console
  myLogger:
    type: AsyncLogger
    minLevel: trace
    tags: _com_request_in,_com_request_*
    bufferSize: '${bufferSize}'
    appenderRef:
      - ref: file
      - ref: sample